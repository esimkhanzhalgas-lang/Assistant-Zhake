<!DOCTYPE html>
<html lang="kk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhake AI - Професссионалды ЖИ</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Сіз жіберген стильдердің жөнделген нұсқасы */
        :root {
            --bg-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --message-bot-bg: #f1f5f9;
            --message-user-bg: linear-gradient(135deg, #6366f1, #a855f7);
        }

        [data-theme="dark"] {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-secondary: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: #1e293b;
            --border-color: #334155;
            --input-bg: #0f172a;
            --message-bot-bg: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-secondary); color: var(--text-primary); transition: 0.3s; min-height: 100vh; }

        .header { background: var(--bg-primary); color: white; padding: 60px 0; text-align: center; position: relative; overflow: hidden; }
        .ai-letter { font-size: 3.5rem; font-weight: 800; animation: colorChange 4s infinite; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        
        @keyframes colorChange { 
            0%, 100% { color: #ffffff; } 50% { color: #f0abfc; } 
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* Theme Toggle */
        .theme-toggle { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary); cursor: pointer; z-index: 1000; box-shadow: var(--card-shadow); transition: 0.3s; }

        /* API Key Section */
        .api-section { margin-top: -30px; position: relative; z-index: 100; margin-bottom: 40px; }
        .api-card { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: var(--card-shadow); border: 1px solid var(--border-color); display: flex; gap: 15px; }
        .api-card input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); outline: none; }

        /* Chat Container */
        .chat-container { background: var(--card-bg); border-radius: 24px; box-shadow: var(--card-shadow); border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 50px; }
        .chat-messages { height: 450px; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; background: var(--bg-secondary); }

        .message { display: flex; gap: 15px; animation: messageSlide 0.4s ease forwards; max-width: 80%; }
        @keyframes messageSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bot-message { align-self: flex-start; }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }

        .message-content { padding: 15px 20px; border-radius: 18px; line-height: 1.6; }
        .bot-message .message-content { background: var(--message-bot-bg); color: var(--text-primary); border-bottom-left-radius: 4px; }
        .user-message .message-content { background: var(--message-user-bg); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        .chat-input-container { display: flex; padding: 20px; gap: 15px; background: var(--card-bg); border-top: 1px solid var(--border-color); }
        .chat-input { flex: 1; padding: 15px 25px; border-radius: 30px; border: 2px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); outline: none; transition: 0.3s; }
        .chat-input:focus { border-color: #6366f1; }

        .chat-send-btn { width: 55px; height: 55px; border-radius: 50%; background: var(--bg-primary); color: white; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
        .chat-send-btn:hover { transform: scale(1.05); }

        /* Typing Dot Animation */
        .dot { width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%; display: inline-block; animation: dotPulse 1.4s infinite; margin: 0 2px; }
        @keyframes dotPulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

<header class="header">
    <div class="container">
        <div class="ai-text-animation">
            <span class="ai-letter">Ж</span>
            <span class="ai-letter">И</span>
        </div>
        <p class="header-subtitle">Заманауи әзірлеушінің көмекшісі</p>
    </div>
</header>

<div class="container api-section">
    <div class="api-card">
        <i class="fas fa-key" style="margin-top: 13px; color: #6366f1;"></i>
        <input type="password" id="apiKey" placeholder="OpenAI API кілтін енгізіңіз (sk-...)">
    </div>
</div>

<div class="container">
    <main class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-content">Сәлем! Мен OpenAI негізіндегі ақылды көмекшімін. Маған кез келген сұрақ қоя аласыз.</div>
            </div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="userInput" class="chat-input" placeholder="Хабарлама жазыңыз..." autocomplete="off">
            <button class="chat-send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.documentElement;
    const sendBtn = document.getElementById('sendBtn');
    const userInput = document.getElementById('userInput');
    const chatMessages = document.getElementById('chatMessages');
    const apiKeyField = document.getElementById('apiKey');

    // Тақырыпты ауыстыру (Light/Dark)
    themeToggle.addEventListener('click', () => {
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        themeToggle.innerHTML = newTheme === 'light' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    });

    // OpenAI API-мен жұмыс
    async function sendMessage() {
        const key = apiKeyField.value.trim();
        const text = userInput.value.trim();

        if (!key) { alert("API кілтті енгізіңіз!"); return; }
        if (!text) return;

        appendMessage(text, 'user-message');
        userInput.value = "";

        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message';
        typingDiv.innerHTML = '<div class="message-content"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
        chatMessages.appendChild(typingDiv);
        scrollChat();

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();
            chatMessages.removeChild(typingDiv);

            if (data.choices) {
                typeEffect(data.choices[0].message.content);
            } else {
                appendMessage("Қате: " + (data.error ? data.error.message : "Кілтті тексеріңіз"), 'bot-message');
            }
        } catch (error) {
            chatMessages.removeChild(typingDiv);
            appendMessage("Байланыс қатесі.", 'bot-message');
        }
    }

    function appendMessage(text, className) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerHTML = `<div class="message-content">${text}</div>`;
        chatMessages.appendChild(div);
        scrollChat();
    }

    function typeEffect(text) {
        const div = document.createElement('div');
        div.className = 'message bot-message';
        const content = document.createElement('div');
        content.className = 'message-content';
        div.appendChild(content);
        chatMessages.appendChild(div);

        let i = 0;
        function type() {
            if (i < text.length) {
                content.textContent += text.charAt(i);
                i++;
                scrollChat();
                setTimeout(type, 20);
            }
        }
        type();
    }

    function scrollChat() { chatMessages.scrollTop = chatMessages.scrollHeight; }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
