<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhake AI Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #171717;
            --main-bg: #212121;
            --card-hover: #2f2f2f;
            --text-main: #ececec;
            --text-dim: #b4b4b4;
            --accent: #10a37f; /* ChatGPT жасыл түсі */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar - Сол жақтағы тарих бөлімі */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: 0.3s;
        }

        .new-chat-btn {
            border: 1px solid #4d4d4d;
            border-radius: 5px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .new-chat-btn:hover { background: var(--card-hover); }

        .history-list { flex: 1; overflow-y: auto; }
        .history-item {
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }
        .history-item:hover { background: var(--card-hover); }
        .history-item i { color: var(--text-dim); font-size: 0.8rem; }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }

        .chat-header {
            padding: 15px 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .message-row {
            padding: 25px 20%;
            width: 100%;
            display: flex;
            gap: 20px;
        }
        .message-row.user { background: transparent; }
        .message-row.bot { background: rgba(255,255,255,0.02); }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .user .avatar { background: #5436da; }
        .bot .avatar { background: var(--accent); }

        .content { font-size: 1rem; line-height: 1.6; color: var(--text-main); width: 100%; }

        /* Input Area */
        .input-wrapper {
            padding: 20px 20%;
            background: linear-gradient(transparent, var(--main-bg) 20%);
        }
        .input-box {
            background: #2f2f2f;
            border: 1px solid #4d4d4d;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
        }
        .send-icon { color: var(--text-dim); cursor: pointer; transition: 0.2s; }
        .send-icon:hover { color: white; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .message-row { padding: 20px 5%; }
            .input-wrapper { padding: 20px 5%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="new-chat-btn">
            <i class="fas fa-plus"></i> New Chat
        </div>
        <div class="history-list">
            <div class="history-item"><i class="far fa-message"></i> Құқық негіздері тест...</div>
            <div class="history-item"><i class="far fa-message"></i> Киберқауіпсіздік Max...</div>
            <div class="history-item"><i class="far fa-message"></i> Master & Margarita...</div>
            <div class="history-item"><i class="far fa-message"></i> HTML/CSS көмек...</div>
        </div>
        <div style="margin-top: auto; padding: 10px; font-size: 0.8rem; color: var(--text-dim);">
            <i class="fas fa-user-circle"></i> Zhake Profile
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <span>Zhake AI <small style="color: var(--accent);">Llama 3.1</small></span>
            <i class="fas fa-ellipsis-h"></i>
        </div>

        <div class="messages-container" id="chatBox">
            <div class="message-row bot">
                <div class="avatar">AI</div>
                <div class="content">Сәлем! Бүгін саған қалай көмектесе аламын?</div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Message Zhake AI..." autocomplete="off">
                <i class="fas fa-paper-plane send-icon" id="sendBtn"></i>
            </div>
            <p style="text-align: center; font-size: 0.7rem; color: var(--text-dim); margin-top: 10px;">
                Zhake AI can make mistakes. Check important info.
            </p>
        </div>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // User message
            addMessage(text, 'user');
            userInput.value = "";

            // Bot response (typing...)
            const botRow = addMessage('<i class="fas fa-circle-notch fa-spin"></i>', 'bot');
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: text }]
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                botRow.querySelector('.content').textContent = ""; // Clear loader
                typeWriter(aiText, botRow.querySelector('.content'));

            } catch (error) {
                botRow.querySelector('.content').textContent = "Қате орын алды. Қайта көріңіз.";
            }
        }

        function addMessage(text, side) {
            const row = document.createElement('div');
            row.className = `message-row ${side}`;
            row.innerHTML = `
                <div class="avatar">${side === 'user' ? 'U' : 'AI'}</div>
                <div class="content">${text}</div>
            `;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
            return row;
        }

        function typeWriter(text, element) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    setTimeout(type, 10);
                }
            }
            type();
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
