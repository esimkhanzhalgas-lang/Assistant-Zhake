<!DOCTYPE html>
<html lang="kk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhake AI - Groq Powered</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --bg-secondary: #020617;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: #1e293b;
            --border-color: #334155;
            --message-bot-bg: #334155;
            --message-user-bg: linear-gradient(135deg, #6366f1, #a855f7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }

        .header { background: var(--bg-primary); padding: 40px 0; text-align: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 900px; margin: 40px auto; width: 90%; flex: 1; }

        .chat-container { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; height: 600px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: #0f172a; }

        .message { display: flex; gap: 12px; max-width: 85%; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot-message { align-self: flex-start; }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }

        .message-content { padding: 12px 18px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
        .bot-message .message-content { background: var(--message-bot-bg); color: white; border-bottom-left-radius: 4px; }
        .user-message .message-content { background: var(--message-user-bg); color: white; border-bottom-right-radius: 4px; }

        .input-area { padding: 20px; background: var(--card-bg); display: flex; gap: 10px; border-top: 1px solid var(--border-color); }
        .chat-input { flex: 1; background: #0f172a; border: 1px solid var(--border-color); border-radius: 15px; padding: 12px 20px; color: white; outline: none; transition: 0.3s; }
        .chat-input:focus { border-color: #6366f1; }

        .send-btn { width: 50px; height: 50px; border-radius: 15px; background: #6366f1; border: none; color: white; cursor: pointer; transition: 0.3s; }
        .send-btn:hover { transform: scale(1.05); background: #4f46e5; }

        /* Typing Dots */
        .dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; display: inline-block; animation: wave 1.3s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">Zhake AI</div>
    <p style="color: var(--text-secondary); margin-top: 5px;">Groq Llama 3.1 арқылы жұмыс істейді</p>
</header>

<div class="container">
    <main class="chat-container">
        <div id="chatMessages" class="chat-messages">
            <div class="message bot-message">
                <div class="message-content">Сәлем! Мен дайынмын. Кілттің керегі жоқ, сұрағыңды қоя бер! 🚀</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" class="chat-input" placeholder="Хабарлама жазыңыз..." autocomplete="off">
            <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<script>
    // СІЗДІҢ GROQ API КІЛТІҢІЗ ОСЫ ЖЕРДЕ
    const GROQ_API_KEY = "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";
    
    const sendBtn = document.getElementById('sendBtn');
    const userInput = document.getElementById('userInput');
    const chatMessages = document.getElementById('chatMessages');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user-message');
        userInput.value = "";

        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message';
        typingDiv.innerHTML = '<div class="message-content"><span class="dot"></span> <span class="dot"></span> <span class="dot"></span></div>';
        chatMessages.appendChild(typingDiv);
        scrollChat();

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{ role: "user", content: text }],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            chatMessages.removeChild(typingDiv);

            if (response.ok) {
                const aiResponse = data.choices[0].message.content;
                typeEffect(aiResponse);
            } else {
                appendMessage("Қате: " + (data.error ? data.error.message : "Байланыс үзілді"), 'bot-message');
            }
        } catch (error) {
            chatMessages.removeChild(typingDiv);
            appendMessage("Серверге қосылу мүмкін емес.", 'bot-message');
        }
    }

    function appendMessage(text, className) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerHTML = `<div class="message-content">${text}</div>`;
        chatMessages.appendChild(div);
        scrollChat();
    }

    function typeEffect(text) {
        const div = document.createElement('div');
        div.className = 'message bot-message';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        div.appendChild(contentDiv);
        chatMessages.appendChild(div);

        let i = 0;
        function type() {
            if (i < text.length) {
                contentDiv.textContent += text.charAt(i);
                i++;
                scrollChat();
                setTimeout(type, 10); // Жылдамдық
            }
        }
        type();
    }

    function scrollChat() { chatMessages.scrollTop = chatMessages.scrollHeight; }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
