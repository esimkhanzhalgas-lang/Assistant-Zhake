<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhake OS - Web Desktop</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --win-bg: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* Desktop Area */
        .desktop {
            height: calc(100vh - 50px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 100px);
            grid-auto-flow: column;
            gap: 10px;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s;
        }
        .icon:hover { background: var(--bg-blur); }
        .icon i { font-size: 2.5rem; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .icon span { font-size: 0.8rem; text-align: center; }

        /* Window Style */
        .window {
            position: absolute;
            width: 800px;
            height: 500px;
            background: var(--win-bg);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .window-header {
            background: #2d2d2d;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .win-buttons { display: flex; gap: 8px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; }
        .close { background: #ff5f56; }
        .min { background: #ffbd2e; }
        .max { background: #27c93f; }

        .window-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Chat Specific */
        #chatContent { height: 100%; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; background: #121212; }
        .input-area { padding: 15px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #2d2d2d; border: none; border-radius: 8px; padding: 10px; color: white; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; }

        /* Taskbar */
        .taskbar {
            height: 50px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 100;
        }
        .start-btn { font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div class="desktop">
        <div class="icon" onclick="openWindow('chatWin')">
            <i class="fas fa-robot" style="color: #6366f1;"></i>
            <span>Zhake AI</span>
        </div>
        <div class="icon" onclick="openWindow('lawWin')">
            <i class="fas fa-gavel" style="color: #f59e0b;"></i>
            <span>Заңнама</span>
        </div>
        <div class="icon" onclick="openWindow('eduWin')">
            <i class="fas fa-graduation-cap" style="color: #10b981;"></i>
            <span>Оқулық</span>
        </div>
    </div>

    <div id="chatWin" class="window" style="top: 10%; left: 15%;">
        <div class="window-header">
            <span><i class="fas fa-robot"></i> Zhake AI Assistant</span>
            <div class="win-buttons">
                <button class="win-btn min"></button>
                <button class="win-btn close" onclick="closeWindow('chatWin')"></button>
            </div>
        </div>
        <div class="window-body">
            <div id="chatContent">
                <div id="messages"></div>
                <div class="input-area">
                    <input type="text" id="userInput" placeholder="Сұрақ қойыңыз...">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="lawWin" class="window" style="top: 20%; left: 25%;">
        <div class="window-header">
            <span><i class="fas fa-gavel"></i> ҚР Еңбек Кодексі</span>
            <div class="win-buttons">
                <button class="win-btn close" onclick="closeWindow('lawWin')"></button>
            </div>
        </div>
        <div class="window-body" style="padding: 20px; overflow-y: auto;">
            <h3>Еңбек заңнамасының негіздері</h3>
            <p style="color: #aaa; margin-top: 10px;">Мұнда сіздің еңбек кодексіне қатысты материалдарыңыз болады...</p>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-btn"><i class="fab fa-windows"></i> Start</div>
        <div id="activeApps"></div>
    </div>

    <script>
        const GROQ_KEY = "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";

        function openWindow(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeWindow(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Chat Logic
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const messages = document.getElementById('messages');

        async function handleChat() {
            const text = userInput.value.trim();
            if(!text) return;

            appendMsg("User", text);
            userInput.value = "";

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{role: "user", content: text}]
                    })
                });
                const data = await response.json();
                appendMsg("AI", data.choices[0].message.content);
            } catch (e) {
                appendMsg("AI", "Қате орын алды.");
            }
        }

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.style.marginBottom = "15px";
            div.innerHTML = `<b style="color: ${sender === 'AI' ? '#6366f1' : '#10b981'}">${sender}:</b> <p style="margin-top: 5px;">${text}</p>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });

        // Simple Drag Logic
        document.querySelectorAll('.window-header').forEach(header => {
            header.onmousedown = function(e) {
                let win = header.parentElement;
                let shiftX = e.clientX - win.getBoundingClientRect().left;
                let shiftY = e.clientY - win.getBoundingClientRect().top;

                function moveAt(clientX, clientY) {
                    win.style.left = clientX - shiftX + 'px';
                    win.style.top = clientY - shiftY + 'px';
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);
                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };
        });
    </script>
</body>
</html>
