<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Әзірлеушіге арналған ЖИ-құралдары</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #1a1a1a;
            --card-bg: #ffffff;
            --primary-color: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }

        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 40px; }

        /* Чат стилі */
        .chat-container {
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 40px;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f9fafb;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
        }

        .bot-message {
            align-self: flex-start;
            background: #e5e7eb;
            color: black;
        }

        .chat-input-area {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        button {
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            margin-left: 10px;
            cursor: pointer;
        }

        /* Тәжірибе бөлімі */
        .experience-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fas fa-robot"></i> Әзірлеушіге арналған ЖИ</h1>
        <p>Кілтіңізді енгізіп, сұрақ қойыңыз</p>
    </header>

    <section class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                Сәлем! Мен ЖИ-ассистентпін. API кілтіңіз дұрыс болса, мен сізге көмектесе аламын.
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Сұрағыңызды жазыңыз...">
            <button id="sendBtn">Жіберу <i class="fas fa-paper-plane"></i></button>
        </div>
    </section>

    <section class="experience-card">
        <h2><i class="fas fa-user-graduate"></i> Менің тәжірибем</h2>
        <p><b>Сұраныстар саны:</b> <span id="counter">0</span></p>
        <p>Бұл жоба ЖИ құралдарын веб-әзірлеуге енгізуді үйретеді. ЖИ тек код жазу емес, оны оңтайландыру үшін де керек.</p>
    </section>
</div>

<script>
    // МАҢЫЗДЫ: Өз кілтіңізді мына жерге қойыңыз
    const API_KEY = 'YOUR_API_KEY_HERE'; 
    
    const sendBtn = document.getElementById('sendBtn');
    const userInput = document.getElementById('userInput');
    const chatMessages = document.getElementById('chatMessages');
    const counterDisplay = document.getElementById('counter');
    
    let count = 0;

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Пайдаланушы хабарламасын қосу
        appendMessage(text, 'user-message');
        userInput.value = '';
        
        // 2. Жүктеу индикаторы
        const loadingDiv = appendMessage('Ойланып жатырмын...', 'bot-message');

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [{role: "user", content: text}]
                })
            });

            const data = await response.json();
            
            // Жүктеу мәтінін өшіру
            loadingDiv.remove();

            if (data.choices && data.choices[0]) {
                appendMessage(data.choices[0].message.content, 'bot-message');
                count++;
                counterDisplay.innerText = count;
            } else {
                appendMessage("Қате: API кілт дұрыс емес немесе лимит таусылды.", 'bot-message');
            }

        } catch (error) {
            loadingDiv.remove();
            appendMessage("Байланыс қатесі: Интернетті немесе API кілтті тексеріңіз.", 'bot-message');
            console.error(error);
        }
    }

    function appendMessage(text, className) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return div;
    }

    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
